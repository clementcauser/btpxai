name: Cron — Quote Reminders

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  run:
    name: Trigger quote reminders
    runs-on: ubuntu-latest
    steps:
      - name: Call cron endpoint
        run: |
          curl --fail-with-body \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/quote-reminders"

name: Cron - Weekly Report

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  run:
    name: Send weekly report
    runs-on: ubuntu-latest
    steps:
      - name: Call API
        run: |
          curl -f -s -X GET "${{ secrets.APP_URL }}/api/cron/weekly-report" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

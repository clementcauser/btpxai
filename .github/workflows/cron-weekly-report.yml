name: Cron — Weekly Report

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  run:
    name: Trigger weekly report
    runs-on: ubuntu-latest
    steps:
      - name: Call cron endpoint
        run: |
          curl --fail-with-body \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/weekly-report"
